<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DETAL MICK — Panel</title>
<style>
  :root{--bg:#0b0d0b;--panel:#121612;--panel2:#171d17;--text:#d9ffd4;--muted:#8aa889;--line:#2a362a;--accent:#8cff6a;--danger:#ff7d7d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:repeating-linear-gradient(0deg, rgba(140,255,106,.04) 0 1px, transparent 1px 26px),var(--bg);color:var(--text);min-height:100vh;display:flex}
  .side{width:230px;background:rgba(18,22,18,.92);border-right:1px solid var(--line);padding:18px}
  .brand{font-weight:800;letter-spacing:3px;color:var(--accent);margin-bottom:10px}
  .menu a,.menu button{display:block;width:100%;text-align:left;padding:10px 12px;margin-bottom:8px;border:1px solid var(--line);background:var(--panel2);border-radius:9px;color:var(--text);text-decoration:none;cursor:pointer}
  .main{flex:1;padding:18px}
  .head{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .head h1{font-size:2rem}
  .panel{background:rgba(18,22,18,.95);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .stat{padding:14px;background:var(--panel2);border:1px solid var(--line);border-radius:12px}
  .stat b{display:block;color:var(--accent);font-size:1.4rem;margin-top:6px}
  .form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .full{grid-column:1/-1}
  label{display:block;margin-bottom:6px;color:#bfd8b9;font-size:.88rem}
  input,select,textarea{width:100%;padding:11px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);outline:none}
  textarea{min-height:90px;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  .btn{padding:10px 12px;border:1px solid var(--line);background:var(--accent);color:#071007;border-radius:9px;font-weight:800;cursor:pointer}
  .ghost{background:var(--panel2);color:var(--text)}
  table{width:100%;border-collapse:collapse}
  th,td{padding:11px 10px;border-bottom:1px solid rgba(42,54,42,.7);text-align:left;vertical-align:top}
  th{font-size:.75rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .warn{color:var(--danger)}
  @media (max-width:900px){body{flex-direction:column}.side{width:auto;border-right:0;border-bottom:1px solid var(--line)}.grid{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}}
</style>
</head>
<body>
  <aside class="side">
    <div class="brand">DETAL MICK</div>
    <div style="color:var(--muted);margin-bottom:14px">Panel simple para cargar productos y tal.</div>
    <div class="menu">
      <a href="index.html">Inicio</a>
      <a href="productos.html">Tienda</a>
      <a href="login.html">Login</a>
      <a href="registro.html">Registro</a>
      <button onclick="resetDemo()">Borrar </button>
    </div>
  </aside>
  <main class="main">
    <div class="head">
      <div>
        <h1>Panel de carga</h1>
        <div style="color:var(--muted)">Acá podés sumar productos  a la tienda.</div>
      </div>
      <div class="panel" style="padding:12px 14px;min-width:220px">Sesión: <b id="sessionLabel">sin sesión</b></div>
    </div>

    <div class="grid" id="stats"></div>

    <div class="panel">
      <h2 style="margin-bottom:14px">Nuevo producto</h2>
      <div class="form">
        <div><label>Nombre</label><input id="nombre" placeholder="Ej: Logs de noche"></div>
        <div><label>Categoría</label>
          <select id="categoria">
            <option value="logs">logs</option>
            <option value="alias">alias</option>
            <option value="mapas">mapas</option>
            <option value="tokens">tokens</option>
          </select>
        </div>
        <div><label>Precio</label><input id="precio" type="number" min="0" value="10"></div>
        <div><label>Stock</label><input id="stock" type="number" min="0" value="5"></div>
        <div class="full"><label>Descripción</label><textarea id="descripcion" placeholder="Texto"></textarea></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap">
        <button class="btn ghost" onclick="loadEdit(null)">Limpiar</button>
        <button class="btn" onclick="saveProduct()">Guardar</button>
      </div>
    </div>

    <div class="panel">
      <h2 style="margin-bottom:14px">Productos cagados</h2>
      <div style="overflow:auto">
        <table>
          <thead><tr><th>ID</th><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

<script>
const PRODUCTS_KEY = 'bytebloom_products';
const SESSION_KEY = 'bytebloom_session';
const defaults = [
  {id:1,nombre:'Logs de Prueba',categoria:'logs',descripcion:'Paquete para la tienda.',precio:5,stock:9,icon:'🗃️'},
  {id:2,nombre:'Alias Random',categoria:'alias',descripcion:'Nombres listos.',precio:8,stock:6,icon:'🎭'},
  {id:3,nombre:'Mapa de Red',categoria:'mapas',descripcion:'Esquema.',precio:12,stock:3,icon:'🛰️'},
  {id:4,nombre:'Token Demo',categoria:'tokens',descripcion:'Credencial.',precio:7,stock:11,icon:'🔐'}
];
let products = JSON.parse(localStorage.getItem(PRODUCTS_KEY) || 'null') || defaults;
let editId = null;
const session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');

function save(){ localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products)); render(); }
function loadEdit(p){
  editId = p ? p.id : null;
  document.getElementById('nombre').value = p ? p.nombre : '';
  document.getElementById('categoria').value = p ? p.categoria : 'logs';
  document.getElementById('precio').value = p ? p.precio : 10;
  document.getElementById('stock').value = p ? p.stock : 5;
  document.getElementById('descripcion').value = p ? p.descripcion : '';
}
function saveProduct(){
  const nombre = document.getElementById('nombre').value.trim();
  const categoria = document.getElementById('categoria').value;
  const precio = Number(document.getElementById('precio').value);
  const stock = Number(document.getElementById('stock').value);
  const descripcion = document.getElementById('descripcion').value.trim();
  if(!nombre || Number.isNaN(precio)){ alert('Completá nombre y precio'); return; }
  if(editId){
    products = products.map(p => p.id === editId ? {...p, nombre, categoria, precio, stock, descripcion} : p);
  } else {
    const id = Math.max(0, ...products.map(p => p.id)) + 1;
    products.unshift({id, nombre, categoria, precio, stock, descripcion, icon:'📦'});
  }
  save();
  loadEdit(null);
}
function del(id){ if(!confirm('Borrar producto?')) return; products = products.filter(p => p.id !== id); save(); }
function render(){
  const tb = document.getElementById('tbody');
  tb.innerHTML = products.map(p => `
    <tr>
      <td>${p.id}</td><td>${p.nombre}</td><td>${p.categoria}</td><td>${p.precio}</td><td>${p.stock}</td>
      <td><div class="actions"><button class="btn ghost" onclick='loadEdit(${JSON.stringify(p).replace(/'/g,"\\'")})'>Editar</button><button class="btn ghost warn" onclick="del(${p.id})">Borrar</button></div></td>
    </tr>
  `).join('');
  const total = products.length;
  const stock = products.reduce((a,b)=>a+(Number(b.stock)||0),0);
  const low = products.filter(p => p.stock <= 5).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat">Productos<b>${total}</b></div>
    <div class="stat">Stock total<b>${stock}</b></div>
    <div class="stat">Bajo stock<b>${low}</b></div>
    <div class="stat">Usuario<b>${session ? '@'+session.usuario : 'sin sesión'}</b></div>
  `;
  document.getElementById('sessionLabel').textContent = session ? '@'+session.usuario : 'sin sesión';
}
function resetDemo(){ if(!confirm('Borrar productos de demo y volver a los ejemplos?')) return; localStorage.removeItem(PRODUCTS_KEY); products = defaults; save(); }
render();
</script>
</body>
</html>
