<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DETAL MICK — Login</title>
<style>
  :root{--bg:#0b0d0b;--panel:#121612;--panel2:#171d17;--text:#d9ffd4;--muted:#8aa889;--line:#2a362a;--accent:#8cff6a;--danger:#ff7d7d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),repeating-linear-gradient(0deg, rgba(140,255,106,.04) 0 1px, transparent 1px 26px),var(--bg);color:var(--text);min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
  .side{padding:40px;background:rgba(18,22,18,.9);border-right:1px solid var(--line);display:flex;align-items:center}
  .side h1{font-size:3rem;line-height:.95;margin-bottom:14px}
  .side p{color:var(--muted);line-height:1.7;max-width:38ch}
  .bullet{margin-top:16px;padding-left:18px;color:#bfd8b9}
  .bullet li{margin-bottom:8px}
  .main{display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:420px;background:rgba(18,22,18,.95);border:1px solid var(--line);border-radius:14px;padding:24px}
  .brand{color:var(--accent);letter-spacing:3px;font-weight:800;margin-bottom:8px}
  h2{font-size:2rem;margin-bottom:6px}
  .sub{color:var(--muted);margin-bottom:18px;line-height:1.5}
  .field{margin-bottom:14px}
  label{display:block;margin-bottom:6px;font-size:.88rem;color:#bfd8b9}
  input{width:100%;padding:12px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);outline:none}
  input:focus{border-color:var(--accent)}
  .btn{width:100%;padding:12px 14px;border:1px solid var(--line);background:var(--accent);color:#071007;border-radius:10px;font-weight:800;cursor:pointer}
  .btn:hover{filter:brightness(1.05)}
  .msg{display:none;margin-bottom:14px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2)}
  .msg.show{display:block}
  .err{color:var(--danger)}
  .ok{color:#baff9e}
  .links{margin-top:14px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  a{color:var(--accent);text-decoration:none}
  @media (max-width:860px){body{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>
  <section class="side">
    <div>
      <div class="brand">DETAL MICK</div>
      <h1>Entrar<br>al nodo</h1>
      <p>Usá el mismo usuario con el que te registraste. La tienda mostrará tu alias arriba y en el carrito.</p>
      <ul class="bullet">
        <li>Con pago real</li>
        <li>Con datos reales</li>
        <li>El sistema que alberga millones de usuarios</li>
      </ul>
    </div>
  </section>
  <main class="main">
    <div class="card">
      <div class="brand">DETAL MICK</div>
      <h2>Login</h2>
      <div class="sub">Ingresá tu usuario y contraseña para seguir.</div>
      <div id="msg" class="msg"></div>
      <div class="field"><label>Usuario</label><input id="usuario" type="text" placeholder="tu_usuario" onkeydown="key(event)"></div>
      <div class="field"><label>Contraseña</label><input id="password" type="password" placeholder="••••" onkeydown="key(event)"></div>
      <button class="btn" onclick="login()">Entrar</button>
      <div class="links"><a href="registro.html">Crear cuenta</a><a href="index.html">Volver</a></div>
    </div>
  </main>

<script>
const ACCOUNTS_KEY = 'bytebloom_accounts';
const SESSION_KEY = 'bytebloom_session';

function setMsg(text, ok){ const el=document.getElementById('msg'); el.textContent=text; el.className='msg show ' + (ok?'ok':'err'); }
function key(e){ if(e.key==='Enter') login(); }

function login(){
  const usuario = document.getElementById('usuario').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY) || '[]');
  const user = accounts.find(a => a.usuario === usuario && a.password === password);

  if(!user){
    setMsg('Usuario o contraseña incorrectos.', false);
    return;
  }

  localStorage.setItem(SESSION_KEY, JSON.stringify({ nombre: user.nombre, usuario: user.usuario }));
  setMsg('Bienvenido. Cargando la tienda...', true);
  setTimeout(() => location.href = 'productos.html', 700);
}
</script>
</body>
</html>
